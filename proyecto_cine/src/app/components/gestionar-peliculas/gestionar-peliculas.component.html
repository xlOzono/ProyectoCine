<div class="container">
    <h2>Gestión de Películas</h2>
  
    <!-- Botón para crear una nueva película -->
    <button class="btn btn-primary" (click)="nuevaPelicula()">Agregar Película</button>
  
    <!-- Tabla de películas -->
    <table class="table mt-3" *ngIf="peliculas.length > 0">
      <thead>
        <tr>
          <th>Título</th>
          <th>Género</th>
          <th>Duración</th>
          <th>Fecha de Estreno</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pelicula of peliculas">
          <td>{{ pelicula.titulo }}</td>
          <td>{{ pelicula.genero }}</td>
          <td>{{ pelicula.duracion }} min</td>
          <td>{{ pelicula.fechaEstreno }}</td>
          <td>
            <button class="btn btn-sm btn-warning" (click)="editarPelicula(pelicula.id)">Editar</button>
            <button class="btn btn-sm btn-danger" (click)="eliminarPelicula(pelicula.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  
    <!-- Mensaje si no hay películas -->
    <div *ngIf="peliculas.length === 0">
      <p>No hay películas registradas.</p>
    </div>
  </div>
